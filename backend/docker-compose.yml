services:
  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_BASE_URL: ${APP_BASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-vision_cafe}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/vision_cafe?authSource=admin
      MONGODB_DB: ${MONGODB_DB:-vision_cafe}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY}
      GOOGLE_SHEETS_ROSTER_SPREADSHEET_ID: ${GOOGLE_SHEETS_ROSTER_SPREADSHEET_ID}
      GOOGLE_SHEETS_ROSTER_SHEET_NAME: ${GOOGLE_SHEETS_ROSTER_SHEET_NAME:-學員帳號}
    expose:
      - "3000"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-vision_cafe}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-vision_cafe}
    expose:
      - "27017"
    volumes:
      - vision-cafe-mongodb:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  vision-cafe-mongodb:
